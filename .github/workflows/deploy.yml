name: Build & Deploy a Plesk

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend deps (prod only) for deploy bundle
        working-directory: backend
        run: npm ci --omit=dev

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.PLESK_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PLESK_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync to Plesk
        env:
          HOST: ${{ secrets.PLESK_HOST }}
          USER: ${{ secrets.PLESK_USER }}
          PATH_REMOTE: ${{ secrets.PLESK_PATH }}
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='frontend/src' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/index.html' \
            --exclude='frontend/vite.config.js' \
            --exclude='frontend/package*.json' \
            --exclude='frontend/postcss.config.js' \
            --exclude='frontend/tailwind.config.js' \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ./ "$USER@$HOST:$PATH_REMOTE/"

      - name: Restart Passenger (Plesk Node app)
        env:
          HOST: ${{ secrets.PLESK_HOST }}
          USER: ${{ secrets.PLESK_USER }}
          PATH_REMOTE: ${{ secrets.PLESK_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 "$USER@$HOST" "mkdir -p $PATH_REMOTE/tmp && touch $PATH_REMOTE/tmp/restart.txt"
